root = "."
tmp_dir = "tmp"

[build]
  cmd = "bash ./scripts/air-build.sh"
  args_bin = []
  entrypoint = ["./tmp/elok", "run"]
  delay = 200
  include_dir = ["cmd", "pkg", "plugins", "ui", "schemas"]
  include_ext = ["go", "svelte", "js", "ts", "css", "html", "json", "toml", "yaml", "yml", "sql"]
  exclude_dir = ["tmp", ".git", "ui/node_modules", "ui/.svelte-kit", "ui/dist", "ui/.vite"]
  exclude_regex = ["_test\\.go", "\\.sql\\.go"]
  log = "tmp/air-build-errors.log"
  stop_on_error = true

[log]
  time = false

[misc]
  clean_on_exit = false

[screen]
  clear_on_rebuild = false
  keep_scroll = true
