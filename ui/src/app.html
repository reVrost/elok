<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />

			content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
		/>
		<meta name="theme-color" content="#161b2b" />
		<meta name="mobile-web-app-capable" content="yes" />
