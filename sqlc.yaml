version: "2"
sql:
  - engine: "sqlite"
    schema: "pkg/store/migrations"
    queries: "pkg/store/queries"
    gen:
      go:
        package: "sqlc"
        out: "pkg/store/sqlc"
        emit_json_tags: true
        emit_empty_slices: true
        sql_package: "database/sql"
        emit_interface: true
