db_path = "~/.elok/elok.db"
listen_addr = "127.0.0.1:7777"

[logging]
format = "text" # text|json
level = "info"  # debug|info|warn|error

[observability]
victoria_logs_url = ""
victoria_logs_queue_size = 1024
victoria_logs_flush_ms = 500
victoria_logs_batch_size = 262144
victoria_logs_timeout_ms = 3000

[llm]
provider = "mock"
model = "mock/default"
api_key_env = "OPENROUTER_API_KEY"
base_url = "https://openrouter.ai/api/v1"
codex_auth_path = "~/.codex/auth.json"

[gateway]
enable_ws = true

[whatsapp]
enabled = false
store_path = "~/.elok/whatsapp.db"

[tenancy]
mode = "single" # single|multi (multi is reserved/TODO)
default_tenant_id = "default"

[plugins]
enabled = true

[[plugins.entries]]
id = "plan-mode"
command = ["go", "run", "./plugins/plan-mode/cmd/planmode"]
